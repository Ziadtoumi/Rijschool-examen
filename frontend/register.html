<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Register - Rijschool Toumi</title>
    <link rel="stylesheet" href="/css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-split">

    <!-- LINKS -->
    <div class="auth-left">
        <div class="auth-left-content">
            <div class="logo-circle">RT</div>
            <h2>Rijschool Toumi</h2>
            <p>Jouw reis naar de open weg begint hier. <br> Volg rijlessen en rij vol zelfvertrouwen.</p>
        </div>
    </div>

    <!-- RECHTS -->
    <div class="auth-right">
        <div class="auth-form">
            <h1>Account Aanmaken</h1>
            <p class="subtitle">Maak een account aan om te beginnen met leren.</p>

            <label>Naam</label>
            <div class="input-wrapper">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="name" placeholder="Jouw naam">
            </div>

            <label>Email</label>
            <div class="input-wrapper">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
                <input type="email" id="email" placeholder="you@example.com">
            </div>

            <label>Wachtwoord</label>
            <div class="input-wrapper">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button type="button" onclick="register()">Account Aanmaken →</button>

            <p>Heb je al een account? <a href="login.html">Log in</a></p>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
